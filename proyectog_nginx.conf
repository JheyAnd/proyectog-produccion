    # =================================================================
    # 19. PROYECTOG RESTRUCTURING V2 (NUEVO)
    # =================================================================

    # ── Backends (Opcional si usas los subdominios directos) ──────────────
    server {
        listen 443 ssl;
        server_name api-patio-sur.pcmejia.com;
        location / {
            proxy_pass http://127.0.0.1:8029;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name api-cash-flow.pcmejia.com;
        location / {
            proxy_pass http://127.0.0.1:8030;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name api-business-case.pcmejia.com;
        location / {
            proxy_pass http://127.0.0.1:8031;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name api-cronograma.pcmejia.com;
        location / {
            proxy_pass http://127.0.0.1:8032;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Frontend Principal (Shell) y Rutas API ──────────────
    server {
        listen 443 ssl;
        server_name patio-sur.pcmejia.com;
        root "C:/PCM_Apps/proyectog-restructuring-v2/frontend/dist";
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy Reverso al Backend Core
        location /api/ {
            proxy_pass http://127.0.0.1:8029;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy para WebSockets (Socket.IO)
        location /socket.io/ {
            proxy_pass http://127.0.0.1:8029;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ==========================================
        # Reglas para Microservicio: Cash Flow
        # ==========================================
        # 1. Peticiones desde el Shell (/api/v1/projects/{id}/cash-flow/...)
        location ~ ^/api/v1(?:/v2)?/projects/[^/]+/cash-flow {
            proxy_pass http://127.0.0.1:8030;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # 2. Peticiones desde el MFE (/api/v1/cash-flow/projects/...)
        location /api/v1/cash-flow/ {
            proxy_pass http://127.0.0.1:8030;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # Reglas para Microservicio: Business Case
        # ==========================================
        # 1. Peticiones desde el Shell (/api/v1/projects/{id}/business-case/...)
        location ~ ^/api/v1/projects/[^/]+/business-case {
            proxy_pass http://127.0.0.1:8031;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # 2. Peticiones desde el MFE (/api/v1/business-case/projects/...)
        location /api/v1/business-case/ {
            proxy_pass http://127.0.0.1:8031;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # Reglas para Microservicio: Cronograma
        # ==========================================
        # 1. Peticiones desde el Shell (/api/v1/projects/{id}/cronograma/...)
        location ~ ^/api/v1/projects/[^/]+/cronograma {
            proxy_pass http://127.0.0.1:8032;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # 2. Peticiones desde el MFE (/api/v1/cronograma/projects/...)
        location /api/v1/cronograma/ {
            proxy_pass http://127.0.0.1:8032;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Microfrontends Remotos ──────────────
    server {
        listen 443 ssl;
        server_name cash-flow.pcmejia.com;
        root "C:/PCM_Apps/proyectog-restructuring-v2/cash-flow-frontend/dist";
        index index.html;
        location / {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen 443 ssl;
        server_name business-case.pcmejia.com;
        root "C:/PCM_Apps/proyectog-restructuring-v2/business-case-frontend/dist";
